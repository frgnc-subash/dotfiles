# ┬ ┬┬ ┬┌─┐┬─┐┬┌┬┐┬  ┌─┐
# ├─┤└┬┘├─┘├┬┘│ │││  ├┤ 
# ┴ ┴ ┴ ┴  ┴└─┴─┴┘┴─┘└─┘

# -------------------
# General Settings
# -------------------
general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# -------------------
# 1. Dim Display (2.5 mins)
# -------------------
listener {
    timeout = 150
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# -------------------
# 2. Keyboard Backlight (2.5 mins)
# -------------------
listener { 
    timeout = 150
    on-timeout = brightnessctl -sd rgb:kbd_backlight set 0
    on-resume = brightnessctl -rd rgb:kbd_backlight
}

# -------------------
# 3. HyprDVD Screensaver (3 mins) - UPDATED
# -------------------
listener {
    timeout = 100
    on-timeout = brightnessctl -r && hyprctl dispatch exec "hyprdvd -s"
    on-resume = pkill hyprdvd
}

# -------------------
# 4. Lock Screen (5 mins)
# -------------------
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# -------------------
# 5. Screen Power (5.5 mins)
# -------------------
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && brightnessctl -r
}

# -------------------
# 6. Suspend System (30 mins)
# -------------------
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
